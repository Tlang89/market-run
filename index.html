<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pusher: The 90s Edition</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#0a0a0a;
    color:#d4af37;
}

.topbar {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#111;
    border-bottom:1px solid #333;
    font-size:14px;
}

.container {
    display:flex;
    flex-direction:column;
    height:100vh;
}

.main {
    flex:1;
    display:flex;
}

.panel {
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.left { border-right:1px solid #222; }

h3 { margin-top:0; }

.item {
    display:flex;
    justify-content:space-between;
    padding:8px;
    border-bottom:1px solid #222;
}

button {
    background:#222;
    color:#d4af37;
    border:1px solid #444;
    padding:6px 10px;
    margin-top:5px;
    cursor:pointer;
}

button:hover { background:#333; }

.bottom {
    height:120px;
    overflow-y:auto;
    background:#050505;
    border-top:1px solid #222;
    padding:8px;
    font-size:12px;
}

.nav {
    display:flex;
    justify-content:space-around;
    padding:8px;
    background:#111;
    border-top:1px solid #222;
}

.flash {
    animation:flash 0.3s;
}

@keyframes flash {
    from { background:#333; }
    to { background:transparent; }
}
</style>
</head>

<body>

<div class="container">

<!-- TOP BAR -->
<div class="topbar">
    <div>📍 <span id="city">New York</span></div>
    <div>💰 $<span id="cash">500</span></div>
    <div>❤️ <span id="health">100</span></div>
    <div>🔥 <span id="heat">Low</span></div>
</div>

<!-- MAIN -->
<div class="main">

<!-- MARKET -->
<div class="panel left">
    <h3>Market</h3>
    <div id="market"></div>
</div>

<!-- INVENTORY -->
<div class="panel">
    <h3>Inventory</h3>
    <div id="inventory"></div>
</div>

</div>

<!-- STREET FEED -->
<div class="bottom" id="feed"></div>

<!-- NAV -->
<div class="nav">
    <button onclick="showMarket()">Market</button>
    <button onclick="travel()">Travel</button>
</div>

</div>

<script>

// GAME STATE
let cash = 500;
let health = 100;
let heat = "Low";
let city = "New York";

let inventory = {};

let items = [
    {name:"Pagers", price:120},
    {name:"Sneakers", price:200},
    {name:"Jewelry", price:500},
    {name:"Electronics", price:350}
];

// SOUND
const clickSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const cashSound = new Audio("https://actions.google.com/sounds/v1/cash/cash_register.ogg");
const alertSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// VIBRATION
function vibrate(strength=50){
    if(navigator.vibrate) navigator.vibrate(strength);
}

// FEED
function log(msg){
    let feed = document.getElementById("feed");
    let time = new Date().toLocaleTimeString();
    feed.innerHTML = `[${time}] ${msg}<br>` + feed.innerHTML;
}

// RENDER
function render(){
    document.getElementById("cash").innerText = cash;
    document.getElementById("city").innerText = city;

    let marketHTML = "";
    items.forEach((item,i)=>{
        marketHTML += `
        <div class="item">
            <span>${item.name} ($${item.price})</span>
            <div>
                <button onclick="buy(${i})">Buy</button>
                <button onclick="sell(${i})">Sell</button>
            </div>
        </div>`;
    });
    document.getElementById("market").innerHTML = marketHTML;

    let invHTML = "";
    for(let key in inventory){
        invHTML += `<div class="item">${key} x${inventory[key]}</div>`;
    }
    document.getElementById("inventory").innerHTML = invHTML || "Empty";
}

// BUY
function buy(i){
    let item = items[i];
    if(cash >= item.price){
        cash -= item.price;
        inventory[item.name] = (inventory[item.name]||0)+1;

        cashSound.play();
        vibrate(40);

        log(`Bought ${item.name}`);
    } else {
        alertSound.play();
        vibrate(100);
        log("Not enough cash.");
    }
    render();
}

// SELL
function sell(i){
    let item = items[i];
    if(inventory[item.name]){
        cash += item.price;
        inventory[item.name]--;

        cashSound.play();
        vibrate(30);

        log(`Sold ${item.name}`);
    }
    render();
}

// TRAVEL
function travel(){
    let cities = ["Chicago","Miami","Los Angeles","Atlanta"];
    city = cities[Math.floor(Math.random()*cities.length)];

    clickSound.play();
    vibrate(80);

    log(`Flew to ${city}`);

    // RANDOM EVENT
    if(Math.random() < 0.4){
        alertSound.play();
        vibrate(120);
        log("⚠ Trouble in the streets...");
    }

    render();
}

// INIT
render();
log("Welcome to The Pusher.");

</script>

</body>
</html>
