<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pusher: 90s Edition</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#d4af37;
  font-family:Arial, sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #333;
}

.panel{
  border:1px solid #333;
  padding:10px;
  margin:10px;
}

button{
  background:#111;
  color:#d4af37;
  border:1px solid #d4af37;
  padding:6px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
}

.tonieBox{
  width:90%;
  max-width:400px;
  background:#111;
  border:2px solid #d4af37;
  padding:10px;
  text-align:center;
}

img{max-width:100%;}
</style>
</head>

<body>

<div class="topbar">
  <div>City: <span id="city"></span></div>
  <div>Cash: $<span id="cash"></span></div>
  <div>Debt: $<span id="debt"></span></div>
</div>

<div id="game"></div>

<script>

let city="New York";
let cash=3000;
let debt=0;

let cities=["New York","Chicago","Miami","LA","Atlanta"];

let items=[
 {name:"Pagers",price:120},
 {name:"Sneakers",price:200},
 {name:"Jewelry",price:500},
 {name:"Electronics",price:350},
 {name:"Bootleg Tapes",price:80},
 {name:"Luxury Watches",price:1000},
 {name:"Hot Merchandise",price:900},
 {name:"Locked Cases",price:2000}
];

let inventory={};

function render(){
 document.getElementById("city").innerText=city;
 document.getElementById("cash").innerText=cash;
 document.getElementById("debt").innerText=debt;

 let html="<div class='panel'><b>Market</b><br>";

 items.forEach((item,i)=>{
  html+=item.name+" ($"+item.price+") ";
  html+=`<button onclick="buy(${i})">Buy</button>`;
  html+="<br>";
 });

 html+="</div>";

 html+="<div class='panel'><b>Travel</b><br>";
 cities.forEach(c=>{
  html+=c+` <button onclick="travel('${c}')">Fly</button><br>`;
 });
 html+="</div>";

 html+="<div class='panel'><b>Debt</b><br>";
 html+=`<button onclick="borrow()">Borrow</button>`;
 html+=`<button onclick="pay()">Pay</button>`;
 html+="</div>";

 document.getElementById("game").innerHTML=html;
}

function buy(i){
 let item=items[i];
 if(cash>=item.price){
  cash-=item.price;
  inventory[item.name]=(inventory[item.name]||0)+1;
 }
 render();
}

function travel(c){
 city=c;

 if(debt>1500 && Math.random()<0.3){
  tonie();
 }

 render();
}

function borrow(){
 debt+=1000;
 cash+=1000;
 render();
}

function pay(){
 if(cash>=500){
  cash-=500;
  debt-=500;
 }
 render();
}

function tonie(){
 let html=`
 <div class="overlay">
  <div class="tonieBox">
   <img src="tonie.png">
   <p>Tonie Two-Toe: "You owe me..."</p>
   <button onclick="payTonie()">Pay</button>
   <button onclick="fight()">Fight</button>
   <button onclick="run()">Run</button>
  </div>
 </div>
 `;
 document.body.insertAdjacentHTML("beforeend",html);
}

function closeTonie(){
 document.querySelector(".overlay").remove();
}

function payTonie(){
 if(cash>=1000){
  cash-=1000;
  debt-=1000;
 }
 closeTonie();
 render();
}

function fight(){
 if(Math.random()<0.5){
  cash-=500;
 }
 closeTonie();
 render();
}

function run(){
 if(Math.random()<0.5){
  cash-=300;
 }
 closeTonie();
 render();
}

render();

</script>

</body>
</html>
