<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THE PU$HER</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("New York Street.png") center/cover no-repeat;
  filter:brightness(.7);
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(rgba(0,0,0,.2), rgba(0,0,0,.8));
}

/* TITLE */
.title{
  position:absolute;
  top:30%;
  width:100%;
  text-align:center;
  color:#d4af37;
  font-size:48px;
  letter-spacing:4px;
}

/* BUTTON */
.startBtn{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  width:220px;
  text-align:center;
  padding:14px;
  border:2px solid #d4af37;
  color:#d4af37;
  font-size:18px;
}

/* TAP EFFECT */
.startBtn:active{
  transform:translateX(-50%) scale(.96);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="title">THE PU$HER</div>

<div class="startBtn" onclick="startRun()">
  START RUN
</div>

<!-- YOUR VOICE -->
<audio id="voice" src="playa_hand.m4a"></audio>

<script>

function startRun(){
  // play your voice
  let v = document.getElementById("voice");
  v.currentTime = 0;
  v.play().catch(()=>{});
}

</script>

</body>
</html>
