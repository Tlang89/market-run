<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pusher</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#d4af37;
  font-family:Arial;
}
.wrap{padding:12px}

.card{
  border:1px solid #333;
  padding:12px;
  margin-bottom:10px;
}

.marketRow{
  border-bottom:1px solid #222;
  padding:10px 0;
}

button{
  padding:8px 12px;
  margin:4px;
  background:#1a1a1a;
  color:#d4af37;
  border:1px solid #555;
}

button:hover{background:#2a2a2a}

.good{color:#8ddc92}
.bad{color:#ff9b9b}
.warn{color:#ffc76d}
</style>
</head>

<body>

<div class="wrap">

<h1>THE PUSHER</h1>
<div id="alertText">Streets open.</div>

<div id="hud"></div>

<div class="card">
  <h3>Black Market</h3>
  <div id="market"></div>
</div>

<div class="card">
  <h3>Street Feed</h3>
  <div id="feed"></div>
</div>

</div>

<script>

let cash = 3000;
let city = "New York";
let day = 1;

const items = [
  {name:"Pagers", base:120, risk:1, trend:0},
  {name:"Sneakers", base:200, risk:1, trend:0},
  {name:"Jewelry", base:500, risk:2, trend:0},
  {name:"Electronics", base:350, risk:2, trend:0},
  {name:"Bootleg Tapes", base:95, risk:2, trend:0},
  {name:"Luxury Watches", base:900, risk:3, trend:0},
  {name:"Hot Merchandise", base:1300, risk:4, trend:0}
];

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

/* =========================
   🔥 MARKET ENGINE (B)
========================= */
function refreshPrices(){
  items.forEach(item=>{

    // trend movement
    item.trend += rand(-2,2);
    item.trend = Math.max(-5, Math.min(5, item.trend));

    // price reacts to trend
    let trendBoost = 1 + (item.trend * 0.12);

    item.price = Math.floor(
      rand(item.base*0.7, item.base*1.4) * trendBoost
    );

    if(item.price < 40) item.price = 40;
  });
}

/* =========================
   🧠 STREET INTEL (C)
========================= */
function generateIntel(){

  const item = items[rand(0, items.length-1)];
  const accuracy = Math.random();

  let message;

  if(accuracy < 0.7){
    // TRUE intel
    if(item.trend > 1){
      message = `${item.name} heating up. Could spike.`;
    }
    else if(item.trend < -1){
      message = `${item.name} cooling off. Might drop.`;
    }
    else{
      message = `${item.name} stable right now.`;
    }
  } else {
    // FALSE intel
    message = `${item.name} about to explode... or maybe not.`;
  }

  log("Street Intel: " + message, "warn");
}

/* =========================
   📊 VISUAL TREND (D)
========================= */
function trendIcon(trend){
  if(trend > 1) return "📈 Rising";
  if(trend < -1) return "📉 Falling";
  return "➖ Stable";
}

/* =========================
   UI
========================= */

function renderHud(){
  document.getElementById("hud").innerHTML = `
    <div class="card">City: ${city}</div>
    <div class="card">Cash: $${cash}</div>
    <div class="card">Day: ${day}</div>
  `;
}

function renderMarket(){

  let html = "";

  items.forEach((item,i)=>{

    html += `
      <div class="marketRow">
        <b>${item.name}</b><br>
        Risk ${item.risk}/5 • ${trendIcon(item.trend)}<br>
        <b>$${item.price}</b><br>

        <button onclick="buyItem(${i})">Buy</button>
        <button onclick="sellItem(${i})">Sell</button>
      </div>
    `;
  });

  document.getElementById("market").innerHTML = html;
}

function log(msg,type=""){
  const feed = document.getElementById("feed");

  const div = document.createElement("div");
  div.className = type;
  div.textContent = `[Day ${day}] ${msg}`;

  feed.prepend(div);
}

/* =========================
   ACTIONS
========================= */

function buyItem(i){
  const item = items[i];

  if(cash >= item.price){
    cash -= item.price;
    log("Bought " + item.name, "good");
  } else {
    log("Not enough cash", "bad");
  }

  renderAll();
}

function sellItem(i){
  const item = items[i];

  cash += item.price;
  log("Sold " + item.name, "good");

  renderAll();
}

/* =========================
   LOOP
========================= */

function nextTurn(){
  day++;
  refreshPrices();

  // random intel chance
  if(Math.random() < 0.6){
    generateIntel();
  }

  renderAll();
}

function renderAll(){
  renderHud();
  renderMarket();
}

/* =========================
   INIT
========================= */

refreshPrices();
renderAll();

// auto turn cycle (feels alive)
setInterval(nextTurn, 6000);

</script>

</body>
</html>
