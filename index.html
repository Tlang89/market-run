<div class="dashboardGrid">
  <div class="panel">
    <h2>Travel Map</h2>
    <div class="small">Tap a city, then travel or stay.</div>

    <div class="mapWrap">
      <!-- keep your existing SVG map here exactly as it is -->
    </div>

    <div class="cityList" id="cityList"></div>

    <div class="row">
      <button id="travelBtn" class="btn btnPrimary full">Travel</button>
      <button id="stayBtn" class="btn btnSecondary full">Stay Here</button>
    </div>
  </div>

  <div class="panel">
    <h2>Market + Hearsay</h2>
    <div class="small" id="selectedCityInfo"></div>

    <div class="splitMini">
      <div>
        <h3 style="margin-bottom:6px;">Market</h3>
        <div id="marketRows" class="compactScroll"></div>
      </div>

      <div>
        <h3 style="margin-bottom:6px;">Hearsay</h3>
        <div id="hearsayRows" class="compactScroll"></div>
      </div>
    </div>
  </div>
</div>

<div class="accordion">
  <details open>
    <summary>Inventory</summary>
    <div id="inventoryRows" class="compactScroll"></div>
  </details>

  <details>
    <summary>City Events</summary>
    <div id="eventRows" class="compactScroll"></div>
  </details>

  <details>
    <summary>Road Choices</summary>
    <div id="walletRows" class="compactScroll"></div>
  </details>

  <details>
    <summary>Event Log</summary>
    <div id="log" class="log"></div>
  </details>
</div>
