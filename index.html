<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Street Hustle 90s</title>
<style>
body {margin:0;background:#0a0a0a;color:#00ff90;font-family:monospace;text-align:center;}
h1 {margin:10px 0;color:#00ffcc;}
#game {max-width:500px;margin:auto;padding:10px;}
.panel {border:1px solid #00ff90;margin:10px 0;padding:10px;}
button {background:black;border:1px solid #00ff90;color:#00ff90;padding:8px;margin:5px;font-family:monospace;cursor:pointer;}
button:hover {background:#002a1a;}
#log {height:120px;overflow-y:auto;text-align:left;font-size:12px;}
#volume {width:100%;}
</style>
</head>
<body>

<h1>STREET HUSTLE 90s</h1>

<div id="game">

<div class="panel">
<div>Health: <span id="health">100</span></div>
<div>Cash: $<span id="cash">500</span></div>
</div>

<div class="panel">
<button onclick="trade()">Trade</button>
<button onclick="travel()">Travel</button>
<button onclick="rest()">Lay Low</button>
</div>

<div class="panel">
<div>Volume</div>
<input type="range" id="volume" min="0" max="1" step="0.1" value="0.4">
</div>

<div class="panel" id="log"></div>

</div>

<script>
let player = {health:100,cash:500};
let lastChanceUsed=false;

const sounds={
click:new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"),
danger:new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"),
success:new Audio("https://assets.mixkit.co/active_storage/sfx/2183/2183-preview.mp3")
};

function playSound(s){s.volume=document.getElementById("volume").value;s.currentTime=0;s.play();}

function updateUI(){
document.getElementById("health").innerText=player.health;
document.getElementById("cash").innerText=player.cash;
}

function log(m){
let l=document.getElementById("log");
l.innerHTML=m+"<br>"+l.innerHTML;
}

function flash(c){
let f=document.createElement("div");
f.style.position="fixed";
f.style.top=0;f.style.left=0;
f.style.width="100%";f.style.height="100%";
f.style.background=c;f.style.opacity="0.3";
f.style.zIndex=9999;f.style.pointerEvents="none";
document.body.appendChild(f);
setTimeout(()=>f.remove(),150);
}

function lastChanceCheck(){
if(player.health<=0&&!lastChanceUsed){
lastChanceUsed=true;
playSound(sounds.danger);
flash("red");
let choice=confirm("You're about to go down...\n\nOK = RUN\nCancel = STAY");
if(choice){
player.health=10;
player.cash=Math.floor(player.cash*0.7);
log("You ran. Lost cash.");
}else{
if(Math.random()>0.5){
player.health=5;
player.cash=Math.floor(player.cash*1.5);
playSound(sounds.success);
flash("gold");
log("You stayed. Big score.");
}else{
gameOver();
return true;
}}updateUI();return true;}
return false;
}

function trade(){
playSound(sounds.click);
if(Math.random()>0.5){player.cash+=100;log("Trade profit +100");}
else{player.health-=30;log("Deal went bad -30 health");}
if(lastChanceCheck())return;
updateUI();
}

function travel(){
playSound(sounds.click);
player.health-=15;
log("You moved blocks.");
if(lastChanceCheck())return;
updateUI();
}

function rest(){
playSound(sounds.click);
player.health+=10;
log("You laid low.");
updateUI();
}

function gameOver(){
flash("black");
playSound(sounds.danger);
alert("You didn't make it...");
location.reload();
}

updateUI();
log("Welcome to the streets.");
</script>

</body>
</html>
