<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pu$her</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#d4af37;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
}

.game{
  width:95vw;
  max-width:520px;
  height:95vh;
  border:2px solid #d4af37;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:rgba(0,0,0,.85);
}

.header{text-align:center;}
.market{flex:1;display:flex;flex-direction:column;gap:10px;}
.itemCard{flex:1;border:2px solid #d4af37;padding:12px;display:flex;flex-direction:column;justify-content:space-between;}
.buttons{display:flex;gap:10px;}

button{
  flex:1;
  padding:10px;
  background:black;
  color:#d4af37;
  border:1px solid #d4af37;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:flex;
  justify-content:center;
  align-items:center;
}

.comic{
  border:2px solid #d4af37;
  padding:20px;
  background:black;
  text-align:center;
  width:90%;
}
</style>
</head>

<body>

<div class="game">
  <div class="header">
    <h2>THE PU$HER</h2>
    <div id="stats"></div>
  </div>

  <div id="market" class="market"></div>

  <div id="feed">Make your move.</div>
</div>

<script>
let cash=3000;
let day=1;
let currentCards=[];
let moveCount=0;

const items=[
{name:"Pagers",base:120},
{name:"Sneakers",base:200},
{name:"Jewelry",base:500},
{name:"Electronics",base:350},
{name:"Bootleg Tapes",base:80}
];

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function money(n){return "$"+Math.floor(n);}

function render(){
  document.getElementById("stats").innerText=Cash: ${money(cash)} | Day ${day};
  document.getElementById("market").innerHTML=currentCards.map((item,i)=>    <div class="itemCard">       <div><b>${item.name}</b><br>${money(item.price)}</div>       <div class="buttons">         <button onclick="buy(${i})">BUY</button>         <button onclick="sell(${i})">SELL</button>       </div>     </div>  ).join("");
}

function newCards(){
  currentCards=shuffle(items).slice(0,3).map(i=>{
    return {...i,price:Math.floor(i.base*(.7+Math.random().6))};
  });
}

function next(){
  day++;
  newCards();
  render();
}

function buy(i){
  let item=currentCards[i];
  if(cash>=item.price){
    cash-=item.price;
    maybeCharacter();
  }
  next();
}

function sell(i){
  let item=currentCards[i];
  cash+=item.price;
  maybeCharacter();
  next();
}

/ 🔥 CHARACTER BREAK-IN FIX */
function maybeCharacter(){
  moveCount++;

  if(moveCount % 2 !== 0 && Math.random() < .45){
    return;
  }

  let r=Math.random();

  if(r<.16) show("Tonie","Pay up.");
  else if(r<.30) show("Rico","Wrong place.");
  else if(r<.44) show("Eddy","Silent move.");
  else if(r<.64) show("Cake Jaw","Bad deal?");
  else if(r<.82) show("Perrkey","Careful...");
  else show("Comedian","Play a hand?");
}

function show(title,text){
  let d=document.createElement("div");
  d.className="overlay";
  d.innerHTML=    <div class="comic">       <h2>${title}</h2>       <p>${text}</p>       <button onclick="close()">CONTINUE</button>     </div>  ;
  document.body.appendChild(d);
}

function close(){
  document.querySelector(".overlay")?.remove();
}

newCards();
render();
</script>

</body>
</html>
