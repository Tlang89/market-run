<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pu$her</title>

<style>
body{
  margin:0;
  background:#000;
  color:#d4af37;
  font-family:Arial;
}
.container{padding:15px;}
.panel{
  border:1px solid #d4af37;
  padding:12px;
  margin-bottom:10px;
}
button{
  background:#d4af37;
  border:none;
  padding:10px;
  margin:5px;
}
.meta{font-size:12px;color:#aaa}
</style>
</head>

<body>

<div class="container">

<h1>THE PU$HER</h1>
<div id="city">City: New York</div>
<div id="cash">Cash: $3000</div>
<div id="day">Day: 1</div>

<div id="market"></div>

<button onclick="stay()">STAY</button>
<button onclick="travel()">TRAVEL</button>

<div id="log"></div>

</div>

<!-- SOUND -->
<audio id="clickSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_2b6c9f0d1c.mp3"></audio>

<script>

// GAME STATE
let cash=3000;
let city="New York";
let day=1;

// ITEMS
const items=[
{name:"Pagers",base:120,risk:1,trend:0,momentum:0},
{name:"Sneakers",base:200,risk:1,trend:0,momentum:0},
{name:"Jewelry",base:450,risk:2,trend:0,momentum:0},
{name:"Electronics",base:350,risk:2,trend:0,momentum:0},
{name:"Bootleg Tapes",base:80,risk:2,trend:0,momentum:0},
{name:"Luxury Watches",base:700,risk:3,trend:0,momentum:0},
{name:"Hot Merchandise",base:1200,risk:4,trend:0,momentum:0}
];

// CITY BIAS
const cityBias={
"New York":{Jewelry:1,Electronics:1},
"Chicago":{Sneakers:2},
"Miami":{Hot Merchandise:2},
"LA":{Luxury Watches:2},
"Atlanta":{Bootleg Tapes:2}
};

// LOG
function log(msg){
document.getElementById("log").innerHTML+=`<div>${msg}</div>`;
}

// MARKET ENGINE
function refreshPrices(){
items.forEach(item=>{
let move=Math.floor(Math.random()*3)-1;

item.trend+=move+item.momentum;

let bias=cityBias[city]?.[item.name]||0;
item.trend+=bias;

item.trend=Math.max(-3,Math.min(3,item.trend));

item.momentum=Math.floor(item.trend/2);

let multiplier=1+(item.trend*0.15);
item.price=Math.floor(item.base*multiplier+Math.random()*50);
});
}

// DISPLAY
function render(){
let html="";
items.forEach(item=>{

let trendLabel=
item.trend>1?"🔥 HOT":
item.trend>0?"📈 Rising":
item.trend<-1?"💀 Crash":
item.trend<0?"📉 Falling":
"Stable";

html+=`
<div class="panel">
<b>${item.name}</b><br>
<div class="meta">Risk ${item.risk}/5 • ${trendLabel}</div>
$${item.price}<br>
<button onclick="buy('${item.name}')">Buy</button>
<button onclick="sell('${item.name}')">Sell</button>
</div>
`;
});
document.getElementById("market").innerHTML=html;
}

// BUY
function buy(name){
let item=items.find(i=>i.name===name);
if(cash>=item.price){
cash-=item.price;
log(`Bought ${name}`);
maybeEvent();
}
update();
}

// SELL
function sell(name){
let item=items.find(i=>i.name===name);
cash+=item.price;
log(`Sold ${name}`);
maybeEvent();
update();
}

// EVENTS (CHARACTERS)
function maybeEvent(){
let r=Math.random();

if(r<0.15) alert("TONIE TWO TOE: PAY UP.");
else if(r<0.3) alert("RICO: You talking too much.");
else if(r<0.45) alert("EDDY: Watching...");
else if(r<0.65) alert("CAKE JAW: Got something risky...");
else if(r<0.85) alert("PERRKEY: Not every move is money.");
else alert("COMEDIAN: Play a hand?");
}

// STAY
function stay(){
day++;
refreshPrices();
log("Stayed. Market shifted.");
update();
}

// TRAVEL
function travel(){
let cities=["New York","Chicago","Miami","LA","Atlanta"];
city=cities[Math.floor(Math.random()*cities.length)];
day++;
refreshPrices();
log(`Traveled to ${city}`);
update();
}

// UPDATE
function update(){
document.getElementById("cash").innerText="Cash: $"+cash;
document.getElementById("city").innerText="City: "+city;
document.getElementById("day").innerText="Day: "+day;
render();
}

// INIT
refreshPrices();
update();

</script>

</body>
</html>
