<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pusher – 90s Edition</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#d4af37;
  font-family:Arial;
}

/* HUD */
.hud{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  padding:8px;
}
.box{
  border:1px solid #d4af37;
  padding:6px;
  text-align:center;
}

/* CORE LAYOUT */
.main{
  display:flex;
  gap:10px;
  padding:10px;
}

/* LEFT = MARKET */
.left{
  flex:1.5;
  border:1px solid #d4af37;
  padding:10px;
}

/* RIGHT = OPS */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* PANELS */
.panel{
  border:1px solid #d4af37;
  padding:10px;
}

button{
  background:none;
  border:1px solid #d4af37;
  color:#d4af37;
  padding:4px 8px;
}
button:hover{
  background:#d4af37;
  color:#000;
}

/* MOBILE = KEEP STRUCTURE BUT STACK CLEAN */
@media(max-width:900px){
  .main{
    flex-direction:column;
  }
}

/* TONIE */
.tonie{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<!-- HUD -->
<div class="hud">
  <div class="box">City: <span id="city"></span></div>
  <div class="box">Cash: $<span id="cash"></span></div>
  <div class="box">Bank: $0</div>
  <div class="box">Debt: $0</div>
  <div class="box">Day <span id="day"></span> • Low</div>
</div>

<div class="main">

<!-- LEFT -->
<div class="left">
  <h3>Market</h3>
  <div id="market"></div>
</div>

<!-- RIGHT -->
<div class="right">

  <div class="panel">
    <h3>Inventory</h3>
    <div id="inventory">You're carrying nothing.</div>
  </div>

  <div class="panel">
    <h3>Money & Pressure</h3>
    <button onclick="deposit()">Deposit 500</button><br><br>
    <button onclick="withdraw()">Withdraw 500</button><br><br>
    <button onclick="borrow()">Borrow 1000</button><br><br>
    <button onclick="repay()">Repay 500</button>
  </div>

  <div class="panel">
    <h3>Travel</h3>
    <div id="travel"></div>
  </div>

</div>
</div>

<!-- FEED -->
<div class="panel" style="margin:10px;">
  <h3>Street Feed</h3>
  <div id="feed"></div>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="">
</audio>

<script>
let cash = 3000;
let city = "New York";
let day = 1;
let inventory = {};

const cities = ["New York","Chicago","Miami","Los Angeles","Atlanta","Detroit"];

const items = [
  {name:"Pagers",price:120},
  {name:"Sneakers",price:200},
  {name:"Jewelry",price:500},
  {name:"Electronics",price:350},
  {name:"Bootleg Tapes",price:80},
  {name:"Luxury Watches",price:1000},
  {name:"Hot Merchandise",price:900},
  {name:"Locked Cases",price:2000}
];

function render(){
  document.getElementById("city").innerText = city;
  document.getElementById("cash").innerText = cash;
  document.getElementById("day").innerText = day;

  // MARKET
  let m="";
  items.forEach((item,i)=>{
    m+=`${item.name} ($${item.price})
    <button onclick="buy(${i})">Buy</button>
    <button onclick="sell(${i})">Sell</button><br><br>`;
  });
  document.getElementById("market").innerHTML=m;

  // TRAVEL
  let t="";
  cities.forEach(c=>{
    t+=`${c} <button onclick="travel('${c}')">Fly</button><br><br>`;
  });
  document.getElementById("travel").innerHTML=t;

  // INVENTORY
  let inv="";
  for(let i in inventory){
    inv+=`${i} x${inventory[i]}<br>`;
  }
  document.getElementById("inventory").innerHTML=
    inv || "You're carrying nothing.";
}

function buy(i){
  let item=items[i];
  if(cash>=item.price){
    cash-=item.price;
    inventory[item.name]=(inventory[item.name]||0)+1;
    log("Bought "+item.name);
    vibe();
  }
  render();
}

function sell(i){
  let item=items[i];
  if(inventory[item.name]){
    cash+=item.price;
    inventory[item.name]--;
    log("Sold "+item.name);
    vibe();
  }
  render();
}

function travel(c){
  city=c;
  day++;
  log("Flew to "+c);
  maybeTonie();
  vibe();
  render();
}

function deposit(){ cash-=500; log("Deposited"); render(); }
function withdraw(){ cash+=500; log("Withdrew"); render(); }
function borrow(){ cash+=1000; log("Borrowed"); render(); }
function repay(){ cash-=500; log("Paid"); render(); }

function log(msg){
  document.getElementById("feed").innerHTML=
  "[Day "+day+"] "+msg+"<br>"+
  document.getElementById("feed").innerHTML;
}

/* VIBRATION */
function vibe(){
  if(navigator.vibrate) navigator.vibrate(50);
}

/* TONIE */
function maybeTonie(){
  if(Math.random()<0.35){
    showTonie();
  }
}

function showTonie(){
  let t=document.createElement("div");
  t.className="tonie";
  t.innerHTML=`
    <img src="tonie.png" style="max-width:300px"><br><br>
    <button onclick="pay()">Pay</button>
    <button onclick="fight()">Fight</button>
    <button onclick="run()">Run</button>
  `;
  document.body.appendChild(t);
}

function pay(){ cash-=500; location.reload(); }
function fight(){ location.reload(); }
function run(){ location.reload(); }

/* START */
render();
log("Sound live. Streets open.");
log("Welcome to The Pusher: The 90s Edition.");
</script>

</body>
</html>
