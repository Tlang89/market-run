<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pu$her — Core Comic Build</title>

<style>
:root{
  --gold:#d4af37;
  --bright:#f2d97a;
  --soft:#9b8340;
  --good:#77e08a;
  --bad:#ff7777;
  --warn:#ffc76d;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  color:var(--gold);
  font-family:Arial, Helvetica, sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(rgba(0,0,0,.62),rgba(0,0,0,.92)),
    url("New York Street.png") center/cover no-repeat;
}

.game{
  width:95vw;
  max-width:520px;
  height:96vh;
  border:2px solid var(--gold);
  background:rgba(0,0,0,.84);
  box-shadow:0 0 35px rgba(0,0,0,.9), inset 0 0 25px rgba(212,175,55,.06);
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.header{
  text-align:center;
  border-bottom:1px solid rgba(212,175,55,.25);
  padding-bottom:8px;
}

.title{
  font-size:34px;
  font-weight:900;
  color:var(--bright);
  letter-spacing:1px;
}

.sub{
  color:#c76f6f;
  font-size:12px;
  font-weight:900;
  letter-spacing:2px;
  margin-top:4px;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}

.stat{
  border:1px solid rgba(212,175,55,.25);
  background:rgba(20,20,20,.8);
  padding:8px;
}

.label{
  color:var(--soft);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.value{
  color:var(--bright);
  font-size:20px;
  font-weight:900;
}

.market{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.itemCard{
  flex:1;
  min-height:0;
  border:2px solid rgba(212,175,55,.55);
  background:
    linear-gradient(135deg,rgba(255,255,255,.035),rgba(212,175,55,.04));
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.itemTop{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}

.itemName{
  color:var(--bright);
  font-size:22px;
  font-weight:900;
}

.price{
  color:var(--gold);
  font-size:24px;
  font-weight:900;
  white-space:nowrap;
}

.meta{
  color:var(--soft);
  font-size:12px;
  margin-top:4px;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:8px;
}

button{
  flex:1;
  border:1px solid var(--gold);
  background:#080808;
  color:var(--gold);
  padding:12px;
  font-weight:900;
  border-radius:5px;
  cursor:pointer;
}

button:active{
  background:var(--gold);
  color:#000;
  transform:scale(.96);
}

.feed{
  min-height:48px;
  border:1px solid rgba(212,175,55,.25);
  background:rgba(0,0,0,.65);
  padding:8px;
  font-size:13px;
  color:var(--warn);
  line-height:1.35;
}

/* COMIC POPUP */
.overlay{
  position:fixed;
  inset:0;
  z-index:9999;
  background:rgba(0,0,0,.90);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}

.comic{
  width:min(94vw,560px);
  background:
    radial-gradient(circle at top,rgba(212,175,55,.14),transparent 42%),
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.94)),
    #111;
  border:3px solid var(--gold);
  padding:16px;
  text-align:center;
  box-shadow:0 0 38px rgba(0,0,0,.9);
  animation:slam .25s ease-out;
}

.comic img{
  width:100%;
  max-height:42vh;
  object-fit:contain;
  background:#050505;
  border:1px solid rgba(212,175,55,.25);
  margin-bottom:10px;
}

.comic img.broken{display:none}

.comicTag{
  color:var(--soft);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:3px;
  margin-bottom:8px;
}

.comicTitle{
  color:var(--bright);
  font-size:34px;
  font-weight:900;
  margin-bottom:8px;
}

.comicText{
  color:var(--soft);
  font-size:17px;
  line-height:1.35;
  margin-bottom:14px;
}

.good{color:var(--good)}
.bad{color:var(--bad)}
.warn{color:var(--warn)}

@keyframes slam{
  0%{transform:scale(.75) rotate(-2deg);opacity:0}
  70%{transform:scale(1.04) rotate(1deg);opacity:1}
  100%{transform:scale(1) rotate(0)}
}
</style>
</head>

<body>

<div class="game">
  <div class="header">
    <div class="title">THE PU$HER</div>
    <div class="sub">CORE COMIC BUILD</div>

    <div class="stats">
      <div class="stat">
        <div class="label">Cash</div>
        <div class="value" id="cashStat">$3,000</div>
      </div>
      <div class="stat">
        <div class="label">Day</div>
        <div class="value" id="dayStat">1</div>
      </div>
    </div>
  </div>

  <div id="market" class="market"></div>

  <div id="feed" class="feed">Pick a move. The streets will answer.</div>
</div>

<!-- YOUR AUDIO -->
<audio id="voicePlaya" src="playa_hand.m4a"></audio>

<script>
const ASSETS = {
  tonie:"tonie.png",
  rico:"Rico.png",
  eddy:"eddy_silent.png",
  comedian:"The Comedian.png",
  cake:"cake_jaw_jesse.PNG",
  perrkey:"perrkey_two_bricks.PNG"
};

let cash = 3000;
let day = 1;
let currentCards = [];

const items = [
  {name:"Pagers", base:120, risk:1},
  {name:"Sneakers", base:200, risk:1},
  {name:"Jewelry", base:500, risk:2},
  {name:"Electronics", base:350, risk:2},
  {name:"Bootleg Tapes", base:80, risk:2},
  {name:"Luxury Watches", base:900, risk:3},
  {name:"Hot Merchandise", base:1300, risk:4}
];

/* RETRO SOUND */
let audioCtx = null;

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended"){
    audioCtx.resume().catch(()=>{});
  }
}

function beep(freq,dur=.08,vol=.03,type="square"){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(.0001,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(vol,audioCtx.currentTime+.012);
  gain.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime+dur+.03);
}

function clickSound(){
  initAudio();
  beep(880,.045,.027);
  setTimeout(()=>beep(440,.05,.018,"triangle"),45);
}

function warningSound(){
  initAudio();
  beep(110,.12,.05,"sawtooth");
  setTimeout(()=>beep(82,.14,.04,"sawtooth"),90);
}

function winSound(){
  initAudio();
  beep(440,.07,.035);
  setTimeout(()=>beep(660,.07,.035),80);
  setTimeout(()=>beep(880,.1,.035),160);
}

function lossSound(){
  initAudio();
  beep(220,.09,.045,"sawtooth");
  setTimeout(()=>beep(146,.16,.035,"sawtooth"),110);
}

function money(n){
  return "$" + Math.floor(n).toLocaleString();
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-.5);
}

function setFeed(msg){
  document.getElementById("feed").innerHTML = msg;
}

function renderStats(){
  document.getElementById("cashStat").textContent = money(cash);
  document.getElementById("dayStat").textContent = day;
}

function makeMarketCards(){
  currentCards = shuffle(items).slice(0,3).map(item=>{
    const price = Math.floor(item.base * (0.75 + Math.random()*0.7));
    const mood = price > item.base ? "📈 Hot" : price < item.base ? "📉 Low" : "— Stable";
    return {...item, price, mood};
  });
}

function renderMarket(){
  document.getElementById("market").innerHTML = currentCards.map((item,index)=>`
    <div class="itemCard">
      <div>
        <div class="itemTop">
          <div>
            <div class="itemName">${item.name}</div>
            <div class="meta">Risk ${item.risk}/5 • ${item.mood}</div>
          </div>
          <div class="price">${money(item.price)}</div>
        </div>
      </div>

      <div class="buttons">
        <button onclick="buyCard(${index})">BUY</button>
        <button onclick="sellCard(${index})">SELL</button>
      </div>
    </div>
  `).join("");
}

function nextTurn(){
  day++;
  makeMarketCards();
  renderStats();
  renderMarket();
}

function buyCard(index){
  clickSound();
  const item = currentCards[index];

  if(cash >= item.price){
    cash -= item.price;
    setFeed(`Bought ${item.name}. Waiting on the street to answer...`);
    maybeCharacter();
  } else {
    lossSound();
    setFeed(`<span class="bad">Not enough cash for ${item.name}.</span>`);
  }

  nextTurn();
}

function sellCard(index){
  clickSound();
  const item = currentCards[index];
  cash += item.price;
  setFeed(`Sold ${item.name}. The money moved.`);
  maybeCharacter();
  nextTurn();
}

function showPanel(title,img,text,buttons,tag="Comic Event"){
  const existing = document.querySelector(".overlay");
  if(existing) existing.remove();

  const div = document.createElement("div");
  div.className = "overlay";
  div.innerHTML = `
    <div class="comic">
      <div class="comicTag">${tag}</div>
      ${img ? `<img src="${img}" onerror="this.classList.add('broken')">` : ""}
      <div class="comicTitle">${title}</div>
      <div class="comicText">${text}</div>
      <div>${buttons}</div>
    </div>
  `;
  document.body.appendChild(div);
}

function closePanel(){
  const existing = document.querySelector(".overlay");
  if(existing) existing.remove();
}

/* CHARACTER POPUPS WITH IMAGES + SOUND */
function maybeCharacter(){
  const r = Math.random();

  if(r < .18) showRico();
  else if(r < .34) showEddy();
  else if(r < .50) showTonie();
  else if(r < .68) showCake();
  else if(r < .84) showPerrkey();
  else if(r < .94) showComedian();
}

function showTonie(){
  warningSound();
  showPanel(
    "Tonie Two-Toe",
    ASSETS.tonie,
    "Tonie rolls up with thugs behind him. Pay, fight, or run.",
    `<button onclick="toniePay()">Pay $500</button>
     <button onclick="tonieFight()">Fight</button>
     <button onclick="tonieRun()">Run</button>`,
    "Pressure"
  );
}

function toniePay(){
  if(cash >= 500){
    cash -= 500;
    setFeed(`<span class="warn">Paid Tonie. Pressure cooled down.</span>`);
  } else {
    setFeed(`<span class="bad">Not enough cash to pay Tonie.</span>`);
  }
  closePanel();
  renderStats();
}

function tonieFight(){
  cash = Math.max(0,cash-350);
  lossSound();
  setFeed(`<span class="bad">Tonie's thugs worked you over. Lost $350.</span>`);
  closePanel();
  renderStats();
}

function tonieRun(){
  cash = Math.max(0,cash-150);
  setFeed(`<span class="warn">You ran and dropped $150.</span>`);
  closePanel();
  renderStats();
}

function showRico(){
  warningSound();
  showPanel(
    'Rico "The Bat"',
    ASSETS.rico,
    "Wrong block. Wrong time.",
    `<button onclick="ricoFight()">Fight</button>
     <button onclick="ricoRun()">Run</button>`,
    "Street Threat"
  );
}

function ricoFight(){
  cash = Math.max(0,cash-200);
  lossSound();
  setFeed(`<span class="bad">You fought Rico and paid for it. Lost $200.</span>`);
  closePanel();
  renderStats();
}

function ricoRun(){
  setFeed(`<span class="warn">You slipped away from Rico.</span>`);
  closePanel();
}

function showEddy(){
  warningSound();
  showPanel(
    'Eddy "Silent"',
    ASSETS.eddy,
    "He was there before you noticed.",
    `<button onclick="eddyFight()">Fight</button>
     <button onclick="eddyRun()">Run</button>`,
    "Silent Danger"
  );
}

function eddyFight(){
  cash = Math.max(0,cash-250);
  lossSound();
  setFeed(`<span class="bad">Eddy barely moved. You lost $250.</span>`);
  closePanel();
  renderStats();
}

function eddyRun(){
  setFeed(`<span class="warn">You backed off from Eddy.</span>`);
  closePanel();
}

function showCake(){
  clickSound();
  showPanel(
    "Cake Jaw Jesse",
    ASSETS.cake,
    "Cake Jaw is loud, foul-mouthed, and scared behind the grin. Three deals. One might hit.",
    `<button onclick="cakePick(1)">Deal A</button>
     <button onclick="cakePick(2)">Deal B</button>
     <button onclick="cakePick(3)">Deal C</button>
     <button onclick="closePanel()">Ignore</button>`,
    "Untrustworthy Deal"
  );
}

function cakePick(choice){
  if(cash < 400){
    lossSound();
    setFeed(`<span class="bad">Not enough cash for Cake's deal.</span>`);
    closePanel();
    return;
  }

  cash -= 400;

  const winner = rand(1,3);

  if(choice === winner){
    const win = rand(900,2200);
    cash += win;
    winSound();
    setFeed(`<span class="good">Cake actually came through. You made ${money(win)}.</span>`);
  } else {
    const loss = rand(300,900);
    cash = Math.max(0,cash-loss);
    lossSound();
    setFeed(`<span class="bad">Cake burned you. Lost ${money(loss)}.</span>`);
  }

  closePanel();
  renderStats();
}

function showPerrkey(){
  warningSound();
  showPanel(
    'Perrkey "Two Bricks"',
    ASSETS.perrkey,
    "She watches the block like she already knows the ending. Not every fast move is money.",
    `<button onclick="perrkeyTip()">Hear Her Out</button>
     <button onclick="closePanel()">Walk Away</button>`,
    "Street Intel"
  );
}

function perrkeyTip(){
  if(Math.random() < .55){
    const gain = rand(250,850);
    cash += gain;
    winSound();
    setFeed(`<span class="good">Perrkey tipped you clean. +${money(gain)}.</span>`);
  } else {
    cash = Math.max(0,cash-200);
    lossSound();
    setFeed(`<span class="warn">Perrkey's tip smelled like heat. Lost $200.</span>`);
  }

  closePanel();
  renderStats();
}

function showComedian(){
  const voice = document.getElementById("voicePlaya");
  if(voice){
    voice.currentTime = 0;
    voice.volume = .9;
    voice.play().catch(()=>{});
  }

  showPanel(
    "The Comedian",
    ASSETS.comedian,
    "Funny thing about luck... it don't knock twice.",
    `<button onclick="playHand()">Play a Hand</button>
     <button onclick="closePanel()">Ignore</button>`,
    "Luck Can Flip"
  );
}

function playHand(){
  if(Math.random() < .45){
    const win = rand(1200,4000);
    cash += win;
    winSound();
    setFeed(`<span class="good">The Comedian gave POWER. +${money(win)}.</span>`);
  } else {
    const loss = rand(700,2600);
    cash = Math.max(0,cash-loss);
    lossSound();
    setFeed(`<span class="bad">The Comedian gave PAIN. -${money(loss)}.</span>`);
  }

  closePanel();
  renderStats();
}

/* INIT */
makeMarketCards();
renderStats();
renderMarket();
</script>

</body>
</html>
