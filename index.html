<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Pu$her — Master Build</title>

<style>

body{
margin:0;
background:#050505;
color:#f5d76e;
font-family:Arial,sans-serif;
}

.wrap{
max-width:950px;
margin:auto;
padding:12px;
}

h1{
text-align:center;
font-size:38px;
margin:10px 0;
color:#ffd966;
}

.panel{
background:#101010;
border:2px solid #b8942f;
border-radius:12px;
padding:12px;
margin:10px 0;
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
}

button{
background:#171717;
color:#ffd966;
border:1px solid #b8942f;
border-radius:8px;
padding:11px;
font-weight:900;
}

.stat{
display:inline-block;
margin:4px 7px;
}

.item{
display:flex;
justify-content:space-between;
gap:8px;
border-bottom:1px solid #333;
padding:8px 0;
}

.log{
max-height:180px;
overflow:auto;
color:#ddd;
font-size:14px;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:99999;
display:none;
align-items:center;
justify-content:center;
padding:16px;
}

.card{
width:min(92vw,430px);
background:#080808;
border:3px solid #d6ad3a;
color:#f5d76e;
text-align:center;
padding:18px;
box-shadow:0 0 30px rgba(214,173,58,.35);
}

.ticket{
border:2px dashed #d6ad3a;
padding:15px;
background:linear-gradient(180deg,#181818,#050505);
}

.card h2{
font-size:32px;
margin:6px 0;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
border:1px solid #d6ad3a;
margin:8px 0;
}

.result{
display:none;
font-size:21px;
font-weight:900;
color:#fff1a8;
margin:14px 0;
}

</style>
</head>

<body>

<div class="wrap">

<h1>THE PU$HER</h1>

<div class="panel">

<div class="stat">
City:
<b id="city"></b>
</div>

<div class="stat">
Day:
<b id="day"></b>
</div>

<div class="stat">
Cash:
$
<b id="cash"></b>
</div>

<div class="stat">
Heat:
<b id="heat"></b>
</div>

<div class="stat">
Health:
<b id="health"></b>
</div>

<div class="stat">
Block:
<b id="block"></b>
</div>

<div class="stat">
Marked:
<b id="marked"></b>
</div>

</div>

<div class="panel">
<h2>Travel Iowa</h2>

<div class="row" id="travel"></div>

</div>

<div class="panel">

<h2>Market</h2>

<div id="market"></div>

</div>

<div class="panel">

<h2>Street Actions</h2>

<div class="row">

<button onclick="stay()">
Stay Low
</button>

<button onclick="work()">
Side Work
</button>

<button onclick="donnie()">
Donnie Scratch Ticket
</button>

<button onclick="buyBlock()">
Buy Block
</button>

<button onclick="forceEncounter()">
Find Trouble
</button>

<button onclick="saveGame()">
Save
</button>

<button onclick="loadGame()">
Load
</button>

<button onclick="resetGame()">
Reset
</button>

</div>
</div>

<div class="panel">

<h2>Street Intel</h2>

<div id="log" class="log"></div>

</div>

</div>

<div id="pop" class="overlay">

<div class="card">

<div class="ticket">

<h2 id="popTitle">
EVENT
</h2>

<img id="popImg" src="comedian-gift.jpg">

<h3 id="popName"></h3>

<p id="popText"></p>

<div id="popResult" class="result"></div>

<div class="row" style="justify-content:center">

<button id="popMain" onclick="popAction()">
PLAY THIS CARD
</button>

<button onclick="closePop()">
WALK AWAY
</button>

</div>

</div>

</div>

</div>

<script>

let city="Des Moines";
let day=1;
let cash=500;
let heat=0;
let health=100;
let block=false;
let marked=false;

let inv={
Scratchers:0,
Speakers:0,
Watches:0,
Tuna:0
};

let prices={};

let current=null;

const cities=[
"Des Moines",
"Waterloo",
"Cedar Rapids",
"Iowa City",
"Davenport",
"Council Bluffs",
"Urbandale"
];

const goods=[
"Scratchers",
"Speakers",
"Watches",
"Tuna"
];

function rand(a,b){
return Math.floor(Math.random()*(b-a+1))+a;
}

function chance(p){
return Math.random()*100<p;
}

function log(t){
document.getElementById("log").innerHTML=
"• "+t+"<br>"+
document.getElementById("log").innerHTML;
}

function newPrices(){

goods.forEach(g=>{

prices[g]=rand(40,220);

});

}

function render(){

document.getElementById("city").innerText=city;
document.getElementById("day").innerText=day;
document.getElementById("cash").innerText=cash;
document.getElementById("heat").innerText=heat;
document.getElementById("health").innerText=health;
document.getElementById("block").innerText=block?"Possie 1990":"No";
document.getElementById("marked").innerText=marked?"YES":"No";

document.getElementById("travel").innerHTML=
cities.map(c=>
`<button onclick="travel('${c}')">${c}</button>`
).join("");

let html="";

goods.forEach(g=>{

html+=`
<div class="item">

<div>
<b>${g}</b><br>
Price: $${prices[g]}
|
You have: ${inv[g]}
</div>

<div>
<button onclick="buy('${g}')">Buy</button>
<button onclick="sell('${g}')">Sell</button>
</div>

</div>
`;

});

document.getElementById("market").innerHTML=html;

}

function advance(){

day++;

newPrices();

if(block){

let income=rand(25,90);

cash+=income;

heat=Math.max(0,heat-rand(1,5));

log("Possie 1990 protected your block and made $"+income+".");

}

heat+=marked?rand(3,10):rand(0,6);

if(chance(10))crowWarning();
if(chance(10))police();
if(chance(8))robbery();
if(chance(marked?18:10))comedian();

if(health<=0){

alert("Game Over");

resetGame();

return;

}

render();

}

function travel(c){

if(c===city){

log("Stayed in "+city+".");

return;

}

city=c;

cash=Math.max(0,cash-25);

log("Traveled to "+city+".");

advance();

}

function buy(g){

if(cash>=prices[g]){

cash-=prices[g];

inv[g]++;

log("Bought "+g+".");

advance();

}else{

log("Not enough cash.");

}

render();

}

function sell(g){

if(inv[g]>0){

inv[g]--;

cash+=prices[g];

log("Sold "+g+".");

advance();

}else{

log("You do not have "+g+".");

}

render();

}

function stay(){

heat=Math.max(0,heat-rand(6,18));

log("Stayed low.");

advance();

}

function work(){

let p=rand(50,150);

cash+=p;

heat+=rand(2,8);

log("Side work paid $"+p+".");

advance();

}

function buyBlock(){

if(block){

log("You already own the block.");

return;

}

if(cash>=750){

cash-=750;

block=true;

log("Possie 1990 now protects you.");

advance();

}else{

log("Need $750.");

}

render();

}

function show(title,name,text,img,button,action){

current={action};

document.getElementById("popTitle").innerText=title;
document.getElementById("popName").innerText=name;
document.getElementById("popText").innerText=text;
document.getElementById("popImg").src=img;
document.getElementById("popMain").innerText=button;

document.getElementById("popResult").style.display="none";

document.getElementById("popResult").innerText="";

document.getElementById("pop").style.display="flex";

}

function popAction(){

if(current&&current.action){

current.action();

}

}

function closePop(){

document.getElementById("pop").style.display="none";

}

function result(t){

document.getElementById("popResult").innerText=t;

document.getElementById("popResult").style.display="block";

log(t);

render();

setTimeout(closePop,2600);

}

function donnie(){

show(
"DONNIE",
"SCRATCH TICKET",
"Donnie slides you a dirty scratch ticket.",
"donnie.jpg",
"SCRATCH",
function(){

let r=rand(1,6);

if(r===1){

cash+=500;

result("BIG HIT. +$500");

}
else if(r===2){

cash+=100;

result("Small hit. +$100");

}
else if(r===3){

cash=Math.max(0,cash-75);

result("Bad ticket. -$75");

}
else if(r===4){

heat+=15;

result("The ticket was watched. Heat +15");

}
else if(r===5){

health=Math.max(0,health-10);

result("Wrong crowd. Health -10");

}
else{

cash+=rand(20,60);

result("Tiny win.");

}

}
);

}

function comedian(){

const cards=[

{
title:"THE GIFT",
text:"Looks lucky. Smells dangerous.",
img:"comedian-gift.jpg",
play:function(){

cash+=150;

heat=Math.max(0,heat-10);

result("The Comedian gifted you cash.");

}
},

{
title:"THE TRADE",
text:"Nothing free. Nothing clean.",
img:"comedian-trade.jpg",
play:function(){

if(chance(50)){

cash+=250;

result("The trade paid out.");

}else{

cash=Math.max(0,cash-125);

result("The trade took from you.");

}

}
},

{
title:"THE LESSON",
text:"Pain leaves marks.",
img:"comedian-lesson.jpg",
play:function(){

health=Math.max(0,health-15);

heat=Math.max(0,heat-10);

result("The lesson hurt.");

}
},

{
title:"THE JOKE",
text:"Everybody laughs eventually.",
img:"comedian-joke.jpg",
play:function(){

if(chance(50)){

cash+=300;

result("The joke paid.");

}else{

cash=Math.max(0,cash-200);

result("The joke landed on you.");

}

}
},

{
title:"THE GAMBLE",
text:"Luck loves desperation.",
img:"comedian-gamble.jpg",
play:function(){

if(chance(50)){

cash=cash*2;

result("Cash doubled.");

}else{

cash=Math.floor(cash/2);

result("Half your cash vanished.");

}

}
},

{
title:"THE GAME CHANGER",
text:"This card changes everything.",
img:"comedian-gamechanger.jpg",
play:function(){

marked=true;

heat+=10;

result("MARKED BY THE COMEDIAN.");

}
}

];

let pool=cards.slice(0,5);

if(chance(4)){

pool=cards;

}

const card=pool[rand(0,pool.length-1)];

show(
"THE COMEDIAN",
card.title,
card.text,
card.img,
"PLAY THIS CARD",
card.play
);

}

function crowWarning(){

show(
"CROW WARNING",
"THE STREET GETS QUIET",
"A crow lands nearby.",
"crow.jpg",
"LISTEN",
function(){

heat=Math.max(0,heat-8);

result("You listened to the crow.");

}
);

}

function police(){

heat+=rand(8,18);

log("Police pressure moved through "+city+".");

}

function robbery(){

if(cash>50){

let loss=rand(30,120);

cash=Math.max(0,cash-loss);

log("You got hit for $"+loss+".");

}

}

function cakeJaw(){

show(
"CAKE JAW JESSE",
"UNDERCOVER ENERGY",
"He offers goods.",
"cakejaw.jpg",
"TAKE DEAL",
function(){

if(chance(45)){

inv.Watches++;

result("Cake Jaw had a gem.");

}else{

heat+=25;

result("Cake Jaw set you up.");

}

}
);

}

function perrkey(){

show(
"PERRKEY TWO BRICKS",
"WARNING OVERLAY",
"She says the block is hot.",
"perrkey.jpg",
"LISTEN",
function(){

if(chance(60)){

heat=Math.max(0,heat-18);

result("You listened.");

}else{

cash=Math.max(0,cash-100);

result("Cash lost.");

}

}
);

}

function craps(){

show(
"STREET CRAPS",
"DOMINO PLAYER",
"Dice hit the concrete.",
"craps.jpg",
"ROLL",
function(){

if(chance(50)){

cash+=rand(100,300);

result("Dice paid.");

}else{

cash=Math.max(0,cash-rand(75,225));

result("Dice went cold.");

}

}
);

}

function forceEncounter(){

let e=[
donnie,
comedian,
cakeJaw,
perrkey,
craps
];

e[rand(0,e.length-1)]();

}

function saveGame(){

localStorage.setItem(
"pusherMasterSave",
JSON.stringify({
city,
day,
cash,
heat,
health,
block,
marked,
inv,
prices
})
);

log("Game saved.");

}

function loadGame(){

let s=localStorage.getItem("pusherMasterSave");

if(!s){

log("No save found.");

return;

}

let d=JSON.parse(s);

city=d.city;
day=d.day;
cash=d.cash;
heat=d.heat;
health=d.health;
block=d.block;
marked=d.marked;
inv=d.inv;
prices=d.prices;

log("Game loaded.");

render();

}

function resetGame(){

city="Des Moines";
day=1;
cash=500;
heat=0;
health=100;
block=false;
marked=false;

inv={
Scratchers:0,
Speakers:0,
Watches:0,
Tuna:0
};

newPrices();

render();

log("New run started.");

}

newPrices();

render();

log("Welcome to The Pu$her.");

</script>

</body>
</html>
