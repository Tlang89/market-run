<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pu$her</title>

<style>
body{
  margin:0;
  background:#000;
  color:#d4af37;
  font-family:Arial;
}
.title{
  font-size:40px;
  font-weight:bold;
  padding:20px;
}
.btn{
  border:1px solid #d4af37;
  padding:15px;
  margin:10px;
  text-align:center;
  cursor:pointer;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:flex;
  align-items:center;
  justify-content:center;
}
.box{
  border:2px solid #d4af37;
  padding:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}
</style>
</head>

<body>

<div id="menu">
  <div class="title">THE PU$HER</div>
  <div class="btn" onclick="startGame()">NEW RUN</div>
</div>

<div id="game" style="display:none">
  <div class="title">Game Loaded. Streets Open.</div>
</div>

<audio id="carDoorSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_2b6c9f0d1c.mp3"></audio>
<audio id="voicePlaya" src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c9b9b4e3c.mp3"></audio>

<script>

// ===== AUDIO SYSTEM =====
let audioCtx;
let soundtrackTimer;

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function beep(freq,time,vol,type="square"){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type=type;
  o.frequency.value=freq;
  g.gain.value=vol;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  setTimeout(()=>o.stop(),time);
}

function startMusic(){
  initAudio();
  if(soundtrackTimer) return;

  let step=0;

  soundtrackTimer=setInterval(()=>{
    if(step%2===0) beep(120,60,0.01);
    if(step%4===0) beep(220,80,0.02,"triangle");
    if(step%8===0) beep(330,100,0.02);
    step++;
  },300);
}

function stopMusic(){
  clearInterval(soundtrackTimer);
  soundtrackTimer=null;
}

// ===== GAME START =====
function startGame(){
  initAudio();

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";

  // Rusty car door
  const door=document.getElementById("carDoorSound");
  door.play();

  setTimeout(()=>{
    startMusic();
    introSequence();
  },800);
}

// ===== CHARACTER SYSTEM =====
function popup(title,text,buttons){
  const div=document.createElement("div");
  div.className="overlay";
  div.innerHTML=`
    <div class="box">
      <h2>${title}</h2>
      <p>${text}</p>
      ${buttons}
    </div>
  `;
  document.body.appendChild(div);
}

function closePop(){
  document.querySelector(".overlay")?.remove();
}

// ===== INTRO SHOW ALL =====
function introSequence(){
  showTonie();
  setTimeout(showRico,2000);
  setTimeout(showEddy,4000);
  setTimeout(showCake,6000);
  setTimeout(showPerrkey,8000);
}

// ===== CHARACTERS =====

function showTonie(){
  popup("Tonie Two-Toe",
    "Pay. Fight. Or run.",
    `<button onclick="closePop()">Next</button>`
  );
}

function showRico(){
  popup("Rico",
    "Wrong place.",
    `<button onclick="closePop()">Fight</button>
     <button onclick="closePop()">Run</button>`
  );
}

function showEddy(){
  popup("Eddy",
    "You didn’t see him coming.",
    `<button onclick="closePop()">Fight</button>
     <button onclick="closePop()">Run</button>`
  );
}

function showCake(){
  popup("Cake Jaw Jesse",
    "I got something BIG… or maybe I don’t.",
    `<button onclick="closePop()">Buy A</button>
     <button onclick="closePop()">Buy B</button>
     <button onclick="closePop()">Buy C</button>
     <button onclick="closePop()">Ignore</button>`
  );
}

function showPerrkey(){
  popup("Perrkey 'Two Bricks'",
    "Don’t trust him… but don’t trust me either.",
    `<button onclick="closePop()">Listen</button>
     <button onclick="closePop()">Ignore</button>`
  );
}

// ===== COMEDIAN (RARE) =====
function showComedian(){

  stopMusic();

  const voice=document.getElementById("voicePlaya");
  voice.play();

  popup("The Comedian",
    "Funny thing about luck...",
    `<button onclick="playHand()">Play a Hand</button>
     <button onclick="closePop(); startMusic()">Ignore</button>`
  );

  setTimeout(startMusic,3000);
}

function playHand(){
  closePop();

  const win = Math.random() > 0.5;

  popup("Cards",
    win ? "POWER — You win big." : "PAIN — You lose.",
    `<button onclick="closePop()">Continue</button>`
  );
}

// ===== RANDOM EVENTS =====
setInterval(()=>{
  const r=Math.random();

  if(r<0.15) showRico();
  else if(r<0.30) showEddy();
  else if(r<0.50) showCake();
  else if(r<0.65) showPerrkey();
  else if(r<0.70) showComedian();

},8000);

</script>

</body>
</html>
