<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pusher</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

#startOverlay{
  position:fixed;
  inset:0;
  z-index:9999;
}

#startBg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform 1.2s ease;
}

.zooming{
  transform:scale(1.25);
}

#menu{
  position:absolute;
  bottom:120px;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:18px;
  align-items:center;
  transition:opacity .6s ease;
}

.fadeOut{
  opacity:0;
}

.btn{
  width:70%;
  max-width:400px;
  padding:14px;
  border:2px solid gold;
  color:gold;
  text-align:center;
  font-size:20px;
  letter-spacing:2px;
}

#game{
  display:none;
  padding:20px;
  color:gold;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startOverlay">

  <img id="startBg" src="startscreen.PNG">

  <div id="menu">
    <div class="btn" onclick="startRun()">START RUN</div>
    <div class="btn">CONTINUE</div>
    <div class="btn">SETTINGS</div>
    <div class="btn">CREDITS</div>
  </div>

</div>

<!-- GAME -->
<div id="game">
  <h1>THE PUSHER</h1>
  <p>Game Loaded. Streets Open.</p>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c9b9b4e3c.mp3">
</audio>

<audio id="startSound">
  <source src="playa_hand.m4a">
</audio>

<audio id="carDoorSound">
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2b6c9f0d1c.mp3">
</audio>

<script>
function startRun(){

  const bg = document.getElementById("startBg");
  const menu = document.getElementById("menu");
  const overlay = document.getElementById("startOverlay");
  const game = document.getElementById("game");

  const music = document.getElementById("bgMusic");
  const startSound = document.getElementById("startSound");
  const door = document.getElementById("carDoorSound");

  // PLAY SOUNDS
  if(startSound){
    startSound.currentTime = 0;
    startSound.play().catch(()=>{});
  }

  if(door){
    door.currentTime = 0;
    door.volume = 0.8;
    door.play().catch(()=>{});
  }

  // ANIMATION
  bg.classList.add("zooming");
  menu.classList.add("fadeOut");

  // TRANSITION
  setTimeout(() => {
    overlay.style.opacity = "0";
    overlay.style.transition = "opacity 0.6s";

    setTimeout(() => {
      overlay.style.display = "none";
      game.style.display = "block";

      // MUSIC STARTS AFTER TRANSITION
      if(music){
        music.volume = 0.35;
        music.play().catch(()=>{});
      }

    }, 600);

  }, 1200);
}
</script>

</body>
</html>
