<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Run</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}
.container{padding:15px;}
button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  background:gold;
  color:#111;
}
.city{background:#222;color:#fff;}
.panel{
  background:#1a1a1a;
  margin:10px 0;
  padding:10px;
  border-radius:12px;
}
.log{
  max-height:200px;
  overflow:auto;
  background:#000;
  padding:10px;
  border-radius:10px;
}
.overlay{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}
</style>
</head>

<body>

<div id="overlay" class="overlay">
  <h1 style="color:gold;">Market Run</h1>
  <p>Travel, buy, sell, profit or lose.</p>
  <button onclick="startGame()">Enter the Market</button>
</div>

<div class="container">

<h2 id="day">Day 1</h2>
<h3 id="cash">$2500</h3>
<h3 id="city">Des Moines</h3>

<div class="panel">
<h3>Travel</h3>
<div id="cities"></div>
<button onclick="travel()">Travel</button>
</div>

<div class="panel">
<h3>Market</h3>
<div id="market"></div>
</div>

<div class="panel">
<h3>Inventory</h3>
<div id="inventory"></div>
</div>

<div class="panel log" id="log"></div>

</div>

<script>

let state={
  day:1,
  cash:2500,
  city:"Des Moines",
  selected:"Des Moines",
  inventory:{
    Food:{qty:0,avg:0},
    Sneakers:{qty:0,avg:0},
    Electronics:{qty:0,avg:0}
  },
  prices:{}
};

const cities=["Des Moines","Waterloo","Cedar Falls","Ames"];
const items=["Food","Sneakers","Electronics"];

function rand(min,max){return Math.floor(Math.random()*(max-min))+min;}

function log(msg){
  let div=document.createElement("div");
  div.innerHTML=msg;
  document.getElementById("log").prepend(div);
}

function initPrices(){
  cities.forEach(c=>{
    state.prices[c]={};
    items.forEach(i=>{
      state.prices[c][i]=rand(80,600);
    });
  });
}

function nextDay(){
  state.day++;
  cities.forEach(c=>{
    items.forEach(i=>{
      state.prices[c][i]+=rand(-40,40);
      if(state.prices[c][i]<20) state.prices[c][i]=20;
    });
  });
}

function render(){
  document.getElementById("day").innerText="Day "+state.day;
  document.getElementById("cash").innerText="$"+state.cash;
  document.getElementById("city").innerText=state.city;

  let cityDiv="";
  cities.forEach(c=>{
    cityDiv+=`<button class="city" onclick="selectCity('${c}')">${c}</button>`;
  });
  document.getElementById("cities").innerHTML=cityDiv;

  let marketHTML="";
  items.forEach(i=>{
    let p=state.prices[state.city][i];
    marketHTML+=`
      ${i} $${p}
      <button onclick="buy('${i}')">Buy</button>
      <button onclick="sell('${i}')">Sell</button>
      <br>
    `;
  });
  document.getElementById("market").innerHTML=marketHTML;

  let invHTML="";
  items.forEach(i=>{
    let inv=state.inventory[i];
    invHTML+=`${i}: ${inv.qty} (avg $${Math.round(inv.avg)})<br>`;
  });
  document.getElementById("inventory").innerHTML=invHTML;
}

function selectCity(c){
  state.selected=c;
  log("Selected "+c);
}

function travel(){
  if(state.selected===state.city){
    log("Already here");
    return;
  }

  log("🔵 Traveling to "+state.selected+"...");
  state.city=state.selected;

  nextDay();

  if(Math.random()<0.5){
    let gain=rand(50,200);
    state.cash+=gain;
    log("💰 Bonus +$"+gain);
  }else{
    let loss=rand(50,200);
    state.cash-=loss;
    log("💀 Lost -$"+loss);
  }

  render();
}

function buy(item){
  let price=state.prices[state.city][item];
  if(state.cash<price){
    log("Not enough cash");
    return;
  }

  let inv=state.inventory[item];
  inv.avg=((inv.avg*inv.qty)+price)/(inv.qty+1);
  inv.qty++;

  state.cash-=price;

  log("Bought "+item+" for $"+price);
  render();
}

function sell(item){
  let inv=state.inventory[item];
  if(inv.qty<=0){
    log("Nothing to sell");
    return;
  }

  let price=state.prices[state.city][item];
  let profit=price-inv.avg;

  state.cash+=price;
  inv.qty--;

  if(inv.qty===0) inv.avg=0;

  log((profit>=0?"Profit ":"Loss ")+profit.toFixed(0));
  render();
}

function startGame(){
  document.getElementById("overlay").style.display="none";
  initPrices();
  render();
}

</script>

</body>
</html>
