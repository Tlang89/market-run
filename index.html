<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pusher – 90s Edition</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#d4af37;
  font-family:Arial, sans-serif;
}

.container{
  padding:10px;
}

/* TOP HUD */
.hud{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}
.box{
  border:1px solid #d4af37;
  padding:8px;
  text-align:center;
}

/* MAIN LAYOUT */
.main{
  display:grid;
  grid-template-columns:1.45fr 0.95fr;
  gap:10px;
  align-items:start;
}

.panel{
  border:1px solid #d4af37;
  padding:10px;
}

.panel h3{
  margin:0 0 8px 0;
}

/* RIGHT SIDE STACK */
.rightGrid{
  display:grid;
  grid-template-rows:auto auto auto;
  gap:10px;
}

/* BUTTONS */
button{
  background:none;
  border:1px solid #d4af37;
  color:#d4af37;
  padding:4px 8px;
  cursor:pointer;
}
button:hover{
  background:#d4af37;
  color:#000;
}

/* MOBILE FIX */
@media (max-width: 980px){

  .hud{
    grid-template-columns:1fr 1fr;
  }

  .main{
    grid-template-columns:1fr;
  }

  .panel{
    min-height:auto;
  }

  .rightGrid{
    grid-template-rows:auto auto auto;
  }
}
</style>
</head>

<body>
<div class="container">

<!-- HUD -->
<div class="hud">
  <div class="box">City: <span id="city"></span></div>
  <div class="box">Cash: $<span id="cash"></span></div>
  <div class="box">Bank: $0</div>
  <div class="box">Debt: $0</div>
  <div class="box">Day 1 • Low</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- LEFT MARKET -->
<div class="panel">
  <h3>Market</h3>
  <div id="market"></div>
</div>

<!-- RIGHT SIDE -->
<div class="rightGrid">

  <div class="panel">
    <h3>Inventory</h3>
    <div id="inventory">You're carrying nothing. Make a move.</div>
  </div>

  <div class="panel">
    <h3>Money & Pressure</h3>
    <button onclick="deposit()">Deposit 500</button><br><br>
    <button onclick="withdraw()">Withdraw 500</button><br><br>
    <button onclick="borrow()">Borrow 1000</button><br><br>
    <button onclick="repay()">Repay 500</button>
  </div>

  <div class="panel">
    <h3>Travel</h3>
    <div id="travel"></div>
  </div>

</div>
</div>

<!-- FEED -->
<div class="panel" style="margin-top:10px;">
  <h3>Street Feed</h3>
  <div id="feed"></div>
</div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="" type="audio/mpeg">
</audio>

<script>
let cash = 3000;
let city = "New York";
let inventory = {};
let day = 1;

const cities = ["New York","Chicago","Miami","Los Angeles","Atlanta","Detroit"];

const items = [
  {name:"Pagers",price:120},
  {name:"Sneakers",price:200},
  {name:"Jewelry",price:500},
  {name:"Electronics",price:350},
  {name:"Bootleg Tapes",price:80},
  {name:"Luxury Watches",price:1000},
  {name:"Hot Merchandise",price:900},
  {name:"Locked Cases",price:2000}
];

function render(){
  document.getElementById("city").innerText = city;
  document.getElementById("cash").innerText = cash;

  // MARKET
  let m = "";
  items.forEach((item,i)=>{
    m += `${item.name} ($${item.price})
      <button onclick="buy(${i})">Buy</button>
      <button onclick="sell(${i})">Sell</button><br><br>`;
  });
  document.getElementById("market").innerHTML = m;

  // TRAVEL
  let t = "";
  cities.forEach(c=>{
    t += `${c} <button onclick="travel('${c}')">Fly</button><br><br>`;
  });
  document.getElementById("travel").innerHTML = t;

  // INVENTORY
  let inv = "";
  for(let i in inventory){
    inv += `${i} x${inventory[i]}<br>`;
  }
  document.getElementById("inventory").innerHTML =
    inv || "You're carrying nothing. Make a move.";
}

function buy(i){
  let item = items[i];
  if(cash >= item.price){
    cash -= item.price;
    inventory[item.name] = (inventory[item.name]||0)+1;
    log("Bought "+item.name);
    vibe();
  }
  render();
}

function sell(i){
  let item = items[i];
  if(inventory[item.name]){
    cash += item.price;
    inventory[item.name]--;
    log("Sold "+item.name);
    vibe();
  }
  render();
}

function travel(c){
  city = c;
  day++;
  log("Flew to "+c);
  vibe();
  maybeTonie();
  render();
}

function deposit(){ cash-=500; log("Deposited"); render(); }
function withdraw(){ cash+=500; log("Withdrew"); render(); }
function borrow(){ cash+=1000; log("Borrowed"); render(); }
function repay(){ cash-=500; log("Paid"); render(); }

function log(msg){
  document.getElementById("feed").innerHTML =
    "[Day "+day+"] "+msg+"<br>" + document.getElementById("feed").innerHTML;
}

/* VIBRATION */
function vibe(){
  if(navigator.vibrate) navigator.vibrate(50);
}

/* TONIE EVENT */
function maybeTonie(){
  if(Math.random() < 0.3){
    showTonie();
  }
}

function showTonie(){
  let div = document.createElement("div");
  div.style.position="fixed";
  div.style.top="0";
  div.style.left="0";
  div.style.width="100%";
  div.style.height="100%";
  div.style.background="rgba(0,0,0,0.9)";
  div.style.display="flex";
  div.style.flexDirection="column";
  div.style.alignItems="center";
  div.style.justifyContent="center";
  div.innerHTML = `
    <img src="tonie.png" style="max-width:300px"><br><br>
    <button onclick="payTonie()">Pay</button>
    <button onclick="fightTonie()">Fight</button>
    <button onclick="runTonie()">Run</button>
  `;
  document.body.appendChild(div);
}

function payTonie(){ cash-=500; log("Paid Tonie"); location.reload(); }
function fightTonie(){ log("Fight survived"); location.reload(); }
function runTonie(){ log("You ran"); location.reload(); }

/* START */
render();
log("Sound live. Streets open.");
log("Welcome to The Pusher: The 90s Edition.");
</script>

</body>
</html>
