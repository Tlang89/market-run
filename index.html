<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Run</title>

<style>
:root{
  --bg:#0e0f12;
  --panel:#181a20;
  --panel2:#21242c;
  --line:#2c303b;
  --text:#f3efe4;
  --gold:#c9a35f;
}

/* BASE */
body{
  margin:0;
  font-family:Arial;
  background:#0e0f12;
  color:white;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000000e6;
  z-index:999;
}

.hidden{display:none}

/* TUTORIAL */
.tutorialCard{
  width:90%;
  max-width:420px;
  background:#181a20;
  padding:20px;
  border-radius:18px;
  text-align:center;
}

.slide{display:none}
.slide.active{display:block}

.dots{margin-top:10px}
.dot{
  width:8px;
  height:8px;
  display:inline-block;
  background:#555;
  border-radius:50%;
  margin:3px;
}
.dot.active{background:#c9a35f}

/* BUTTON */
.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
.btnPrimary{
  background:#c9a35f;
}

/* TABS */
.mobileTabs{
  display:flex;
  gap:5px;
  overflow:auto;
}
.tabBtn{
  background:#21242c;
  border:none;
  padding:10px;
  color:white;
}
.tabBtn.active{
  background:#c9a35f;
  color:black;
}

.tabPanel{display:none}
.tabPanel.active{display:block}

/* PANELS */
.panel{
  background:#181a20;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

/* MAP */
.mapWrap{
  height:200px;
  background:#111;
  border-radius:10px;
  margin-bottom:10px;
}

/* SCROLL */
.scroll{
  max-height:220px;
  overflow:auto;
}
</style>
</head>

<body>

<!-- 🔥 SWIPE TUTORIAL -->
<div id="tutorialOverlay" class="overlay">
  <div class="tutorialCard">

    <div id="slides">

      <div class="slide active">
        <h2>Market Run</h2>
        <p>Build to $100,000,000</p>
      </div>

      <div class="slide">
        <h2>Pick a City</h2>
        <p>Travel or stay</p>
      </div>

      <div class="slide">
        <h2>Buy Low</h2>
        <p>Find cheap items</p>
      </div>

      <div class="slide">
        <h2>Hearsay</h2>
        <p>Clues for profit</p>
      </div>

      <div class="slide">
        <h2>Sell High</h2>
        <p>Make profit</p>
      </div>

      <div class="slide">
        <h2>Events</h2>
        <p>Big price swings</p>
      </div>

      <div class="slide">
        <h2>Ready?</h2>
        <button class="btn btnPrimary" onclick="startGame()">Start</button>
      </div>

    </div>

    <div id="dots" class="dots"></div>

  </div>
</div>

<!-- 🔥 MAIN GAME -->
<div style="padding:10px">

<div class="mobileTabs">
  <button class="tabBtn active" onclick="showTab('map',this)">Map</button>
  <button class="tabBtn" onclick="showTab('market',this)">Market</button>
  <button class="tabBtn" onclick="showTab('inventory',this)">Inventory</button>
</div>

<div id="map" class="tabPanel active">
  <div class="panel">
    <h3>Map</h3>
    <div class="mapWrap"></div>
    <button class="btn btnPrimary">Travel</button>
  </div>
</div>

<div id="market" class="tabPanel">
  <div class="panel">
    <h3>Market</h3>
    <div class="scroll">Prices here</div>
  </div>
</div>

<div id="inventory" class="tabPanel">
  <div class="panel">
    <h3>Inventory</h3>
    <div class="scroll">Items here</div>
  </div>
</div>

</div>

<script>

/* TABS */
function showTab(id,btn){
  document.querySelectorAll('.tabPanel').forEach(x=>x.classList.remove('active'))
  document.querySelectorAll('.tabBtn').forEach(x=>x.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  btn.classList.add('active')
}

/* TUTORIAL */
let currentSlide = 0
const slides = document.querySelectorAll(".slide")
const dotsContainer = document.getElementById("dots")

slides.forEach((_,i)=>{
  const d=document.createElement("span")
  d.className="dot"
  if(i===0)d.classList.add("active")
  dotsContainer.appendChild(d)
})

const dots = document.querySelectorAll(".dot")

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"))
  dots.forEach(d=>d.classList.remove("active"))
  slides[i].classList.add("active")
  dots[i].classList.add("active")
}

function nextSlide(){
  if(currentSlide < slides.length-1){
    currentSlide++
    showSlide(currentSlide)
  }
}

function prevSlide(){
  if(currentSlide>0){
    currentSlide--
    showSlide(currentSlide)
  }
}

let startX=0
document.getElementById("slides").addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX
})
document.getElementById("slides").addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX
  if(startX-endX>50) nextSlide()
  if(endX-startX>50) prevSlide()
})

function startGame(){
  document.getElementById("tutorialOverlay").classList.add("hidden")
}

</script>

</body>
</html>
