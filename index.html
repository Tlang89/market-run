<!DOCTYPE html>
<html>
<head>
  <title>The Pusher: The 90s Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      background:#0a0a0a;
      color:#d4af37;
      font-family:Arial;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      padding:10px;
      border-bottom:1px solid #333;
      background:#111;
    }

    .game{
      display:flex;
      height:70vh;
    }

    .left, .right{
      flex:1;
      padding:10px;
      border-right:1px solid #222;
    }

    .right{
      border-right:none;
    }

    .panelTitle{
      font-weight:bold;
      margin-bottom:10px;
      border-bottom:1px solid #333;
    }

    .item{
      display:flex;
      justify-content:space-between;
      padding:6px 0;
      border-bottom:1px solid #222;
    }

    button{
      background:#111;
      color:#d4af37;
      border:1px solid #555;
      padding:4px 8px;
      cursor:pointer;
    }

    button:hover{
      background:#222;
    }

    #feed{
      height:120px;
      overflow:auto;
      padding:10px;
      background:#050505;
      border-top:1px solid #222;
      font-size:12px;
    }
  </style>
</head>

<body>

<div class="topbar" id="topbar"></div>

<div class="game">
  <div class="left" id="market"></div>
  <div class="right" id="right"></div>
</div>

<div id="feed"></div>

<script>

let cash = 3000;
let bank = 0;
let debt = 0;

let city = "New York";
let day = 1;

let inventory = {};

let cities = ["New York","Chicago","Miami","LA","Atlanta","Detroit"];

let items = [
  {name:"Pagers", base:120},
  {name:"Sneakers", base:200},
  {name:"Jewelry", base:500},
  {name:"Electronics", base:350},
  {name:"Fake IDs", base:150},
  {name:"Bootleg CDs", base:80},
  {name:"Handguns", base:800},
  {name:"Rifles", base:1500}
];

function log(msg){
  let f = document.getElementById("feed");
  f.innerHTML = msg + "<br>" + f.innerHTML;
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min)+min);
}

function renderTop(){
  document.getElementById("topbar").innerHTML = `
    <div>${city}</div>
    <div>Cash $${cash}</div>
    <div>Bank $${bank}</div>
    <div>Debt $${debt}</div>
    <div>Day ${day}</div>
  `;
}

function renderMarket(){
  let html = `<div class="panelTitle">Market</div>`;

  items.forEach((item,i)=>{
    let price = rand(item.base*0.6, item.base*1.6);
    item.price = price;

    html += `
      <div class="item">
        <div>${item.name} ($${price})</div>
        <div>
          <button onclick="buy(${i})">Buy</button>
          <button onclick="sell(${i})">Sell</button>
        </div>
      </div>
    `;
  });

  return html;
}

function renderRight(){
  let html = `<div class="panelTitle">Actions</div>`;

  html += `
    <button onclick="deposit()">Deposit 500</button><br><br>
    <button onclick="withdraw()">Withdraw 500</button><br><br>
    <button onclick="borrow()">Borrow 1000</button><br><br>
    <button onclick="repay()">Repay 500</button><br><br>
  `;

  html += `<div class="panelTitle">Travel</div>`;

  cities.forEach(c=>{
    html += `<div class="item">${c} <button onclick="travel('${c}')">Fly</button></div>`;
  });

  html += `<div class="panelTitle">Inventory</div>`;

  if(Object.keys(inventory).length === 0){
    html += "Empty";
  } else {
    for(let k in inventory){
      html += `${k}: ${inventory[k]}<br>`;
    }
  }

  return html;
}

function render(){
  renderTop();
  document.getElementById("market").innerHTML = renderMarket();
  document.getElementById("right").innerHTML = renderRight();
}

function buy(i){
  let item = items[i];

  if(cash >= item.price){
    cash -= item.price;
    inventory[item.name] = (inventory[item.name]||0)+1;
    log("Bought " + item.name);
  } else {
    log("Not enough cash");
  }

  render();
}

function sell(i){
  let item = items[i];

  if(inventory[item.name]){
    cash += item.price;
    inventory[item.name]--;
    if(inventory[item.name] === 0) delete inventory[item.name];
    log("Sold " + item.name);
  } else {
    log("You don't have any");
  }

  render();
}

function travel(c){
  city = c;
  day++;
  log("Flew to " + c);
  randomEvent();
  render();
}

function deposit(){
  if(cash >= 500){
    cash -= 500;
    bank += 500;
  }
  render();
}

function withdraw(){
  if(bank >= 500){
    bank -= 500;
    cash += 500;
  }
  render();
}

function borrow(){
  debt += 1000;
  cash += 1000;
  log("Borrowed from the streets...");
  render();
}

function repay(){
  if(cash >= 500 && debt > 0){
    cash -= 500;
    debt -= 500;
  }
  render();
}

function randomEvent(){
  let r = Math.random();

  if(r < 0.2){
    log("🚔 Undercover cops seized your stash!");
    inventory = {};
  }
  else if(r < 0.4){
    let found = rand(500,2000);
    cash += found;
    log("💰 Jackpot! Found $" + found);
  }
}

render();

</script>

</body>
</html>
