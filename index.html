<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pu$her</title>
<style>
  :root{
    --gold:#d4af37;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
  }

  body{
    position:relative;
  }

  .bg{
    position:fixed;
    inset:0;
    background:
      linear-gradient(rgba(0,0,0,.04), rgba(0,0,0,.18)),
      url("startscreen.PNG") center/cover no-repeat;
    transform-origin:70% 62%;
  }

  .start{
    position:absolute;
    inset:0;
  }

  .menu{
    position:absolute;
    left:50%;
    bottom:8%;
    transform:translateX(-50%);
    width:min(78vw, 420px);
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .btn{
    border:2px solid var(--gold);
    color:var(--gold);
    padding:14px;
    text-align:center;
    border-radius:10px;
    font-size:18px;
    letter-spacing:2px;
    background:rgba(0,0,0,0.28);
    width:100%;
    transition:all .15s ease;
  }

  .btn:active{
    background:var(--gold);
    color:#000;
    transform:scale(0.96);
    box-shadow:0 0 20px var(--gold);
  }

  .cloud{
    position:absolute;
    left:18px;
    bottom:18px;
    color:var(--gold);
    font-size:12px;
    opacity:.9;
    letter-spacing:.5px;
  }

  .version{
    position:absolute;
    right:18px;
    bottom:18px;
    color:var(--gold);
    font-size:12px;
    opacity:.8;
    letter-spacing:.5px;
  }

  .zooming{
    animation:zoomToCharacter 1s ease forwards;
  }

  @keyframes zoomToCharacter{
    0%{
      transform:scale(1) translate(0,0);
      filter:brightness(.98);
    }
    100%{
      transform:scale(1.35) translate(-12%,-6%);
      filter:brightness(1.06);
    }
  }

  #game{
    display:none;
  }
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="start" id="start">
  <div class="menu">
    <div class="btn" onclick="startGame()">START RUN</div>
    <div class="btn">CONTINUE</div>
    <div class="btn">SETTINGS</div>
    <div class="btn">CREDITS</div>
    <div class="btn">EXIT GAME</div>
  </div>

  <div class="cloud">☁ CLOUD SAVED</div>
  <div class="version">v1.0.0</div>
</div>

<div id="game"></div>

<audio id="startSound" src="playa_hand.m4a"></audio>

<script>
function startGame() {
  const bg = document.getElementById('bg');
  const sound = document.getElementById('startSound');
  const startScreen = document.getElementById('start');
  const game = document.getElementById('game');

  // Play sound
  if (sound) {
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  }

  // Zoom into character
  bg.classList.add('zooming');

  // HOLD on zoom
  setTimeout(() => {

    // Fade out start screen
    startScreen.style.transition = "opacity 0.6s ease";
    startScreen.style.opacity = "0";

    // After fade → show game
    setTimeout(() => {
      startScreen.style.display = "none";
      game.style.display = "block";
    }, 600);

  }, 1200);
}
</script>

</body>
</html>
