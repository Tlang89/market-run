<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>THE PU$HER</title>

<style>
:root{
  --gold:#d4af37;
  --goldSoft:#e7c86a;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;
  user-select:none;
}

html, body{
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* 🌆 BACKGROUND (USE YOUR REAL IMAGE) */
.bg{
  position:fixed;
  inset:0;
  background:url('New York Street.png') center/cover no-repeat;
  filter:brightness(0.55);
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
}

/* 🧱 GAME BLOCK */
.game{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:420px;

  background:rgba(0,0,0,0.55);
  border:1px solid rgba(212,175,55,0.6);
  border-radius:16px;
  backdrop-filter:blur(6px);

  box-shadow:
    0 0 40px rgba(212,175,55,0.2),
    0 0 80px rgba(212,175,55,0.08);
}

/* HEADER */
.header{
  padding:14px;
  text-align:center;
  color:var(--goldSoft);
  font-weight:bold;
  border-bottom:1px solid rgba(212,175,55,0.3);
}

/* MARKET */
.market{
  padding:14px;
}

.row{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  color:#ddd;
  cursor:pointer;
  transition:0.15s;
}

.row:active{
  transform:scale(0.97);
  color:var(--goldSoft);
}

/* ACTIONS */
.actions{
  display:flex;
  gap:8px;
  padding:12px;
  flex-wrap:wrap;
}

button{
  flex:1;
  min-height:42px;
  background:transparent;
  border:1px solid var(--gold);
  color:var(--goldSoft);
  border-radius:10px;
  font-size:14px;
}

button:active{
  transform:scale(0.97);
}

/* FEED */
.feed{
  padding:10px;
  font-size:12px;
  color:#aaa;
  border-top:1px solid rgba(212,175,55,0.3);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="game">

  <div class="header">
    DETROIT — DAY 1<br>
    $1000 | HEAT: LOW
  </div>

  <div class="market">
    <div class="row">Bootleg Tapes — $50</div>
    <div class="row">Jewelry — $300</div>
    <div class="row">Electronics — $200</div>
  </div>

  <div class="actions">
    <button>SELL</button>
    <button>STORE</button>
    <button>TRAVEL</button>
    <button>STAY</button>
  </div>

  <div class="feed">
    Detroit feels cold tonight...
  </div>

</div>

</body>
</html>
