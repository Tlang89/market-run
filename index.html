<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Market Run</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0f;
  color:#f3efe4;
  text-align:center;
}

/* INTRO SCREEN */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

#intro h1{
  color:gold;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:gold;
  margin-top:20px;
}

/* GAME */
#game{
  display:none;
  padding:20px;
}

.city{
  background:#222;
  margin:10px;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>Market Run</h1>
  <p>
    Travel city to city.<br>
    Buy low. Sell high.<br>
    Listen to whispers.<br>
    Chase the $100,000,000 dream.
  </p>
  <button onclick="startGame()">Enter the Market</button>
</div>

<!-- GAME -->
<div id="game">
  <h2>Day: <span id="day">1</span></h2>
  <h2>Cash: $<span id="cash">2500</span></h2>
  <h3>City: <span id="city">Des Moines</span></h3>

  <div class="city" onclick="selectCity('Des Moines')">Des Moines</div>
  <div class="city" onclick="selectCity('Waterloo')">Waterloo</div>
  <div class="city" onclick="selectCity('Cedar Falls')">Cedar Falls</div>
  <div class="city" onclick="selectCity('Ames')">Ames</div>

  <div id="info"></div>
</div>

<!-- AUDIO -->
<audio id="jazz" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7c7c41c1f0.mp3" type="audio/mpeg">
</audio>

<script>
let cash = 2500
let day = 1
let currentCity = "Des Moines"

/* START GAME */
function startGame(){
  document.getElementById("intro").style.display="none"
  document.getElementById("game").style.display="block"

  // start music (required tap interaction)
  document.getElementById("jazz").play()
}

/* SELECT CITY */
function selectCity(city){
  document.getElementById("info").innerHTML =
    "<h3>"+city+"</h3>" +
    "<button onclick='travel(\""+city+"\")'>Travel</button>"
}

/* TRAVEL */
function travel(city){

  if(city === currentCity){
    alert("Already there")
    return
  }

  currentCity = city
  day++

  let event = Math.random()

  if(event < 0.3){
    let loss = Math.floor(Math.random()*300)
    cash -= loss
    alert("Mugged! Lost $" + loss)
  }
  else if(event < 0.6){
    let gain = Math.floor(Math.random()*300)
    cash += gain
    alert("Lucky deal! Gained $" + gain)
  }
  else{
    alert("Quiet trip.")
  }

  updateStats()
}

/* DAY TICK (SLOW) */
setInterval(()=>{
  day++
  updateStats()
},10000)

/* UPDATE UI */
function updateStats(){
  document.getElementById("day").innerText = day
  document.getElementById("cash").innerText = cash
  document.getElementById("city").innerText = currentCity
}
</script>

</body>
</html>
