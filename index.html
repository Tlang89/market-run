<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Run Iowa</title>

<style>
body {
  margin:0;
  font-family: Georgia;
  background:#081a33;
  color:white;
}

/* LAYOUT */
#top {
  padding:10px;
  text-align:center;
}

#mapWrap {
  width:100%;
  height:60vh;
  position:relative;
  border-top:2px solid #222;
  border-bottom:2px solid #222;
}

/* MAP */
#mapImg {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CITY DOTS */
.city {
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:gold;
  border:2px solid white;
  transform:translate(-50%,-50%);
  cursor:pointer;
}

/* PLAYER DOT */
#player {
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:white;
  border:3px solid gold;
  transform:translate(-50%,-50%);
}

/* UI */
#ui {
  padding:10px;
}

button {
  padding:10px;
  margin:5px;
  font-weight:bold;
  border:none;
  border-radius:8px;
}

.gold { background:gold; }
.blue { background:#4a7bff; color:white; }
</style>
</head>

<body>

<div id="top">
  <h2 id="city">Des Moines</h2>
  <div id="stats">Cash: $2500 | Day 1</div>
  <div id="price">Price: $100</div>
</div>

<div id="mapWrap">
  <img id="mapImg" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Map_of_Iowa_highlighting_counties.svg/1200px-Map_of_Iowa_highlighting_counties.svg.png">
  <div id="player"></div>
</div>

<div id="ui">
  <button class="gold" onclick="buy()">Buy</button>
  <button class="gold" onclick="sell()">Sell</button>
  <button class="blue" onclick="travelRandom()">Move</button>
</div>

<script>

/* GAME STATE */
let cash = 2500;
let day = 1;
let price = 100;
let city = "Des Moines";
let inventory = 0;

/* CITY MAP (BEE STYLE POSITIONS) */
const cities = [
  {name:"Des Moines", x:50, y:55, diff:1},
  {name:"Waterloo", x:70, y:30, diff:2},
  {name:"Dubuque", x:90, y:30, diff:3},
  {name:"Sioux City", x:10, y:40, diff:3},
  {name:"Ames", x:58, y:47, diff:1},
  {name:"Iowa City", x:83, y:56, diff:2},
  {name:"Council Bluffs", x:24, y:60, diff:3}
];

const map = document.getElementById("mapWrap");

/* CREATE CITY DOTS */
cities.forEach(c => {
  let d = document.createElement("div");
  d.className = "city";
  d.style.left = c.x + "%";
  d.style.top = c.y + "%";

  d.onclick = () => travel(c);

  map.appendChild(d);
});

/* PLAYER POSITION */
function movePlayer(x,y){
  const p = document.getElementById("player");
  p.style.left = x + "%";
  p.style.top = y + "%";
}

/* TRAVEL */
function travel(c){
  city = c.name;
  price = Math.floor(Math.random()*150 + 50) * c.diff;
  movePlayer(c.x,c.y);

  day++;
  update();
}

/* RANDOM MOVE BUTTON */
function travelRandom(){
  let c = cities[Math.floor(Math.random()*cities.length)];
  travel(c);
}

/* BUY */
function buy(){
  if(cash >= price){
    cash -= price;
    inventory++;
  }
  update();
}

/* SELL */
function sell(){
  if(inventory > 0){
    cash += price;
    inventory--;
  }
  update();
}

/* UPDATE UI */
function update(){
  document.getElementById("city").innerText = city;
  document.getElementById("price").innerText = "Price: $" + price;
  document.getElementById("stats").innerText =
    "Cash: $" + cash + " | Day " + day + " | Items: " + inventory;
}

/* START POSITION */
movePlayer(50,55);
update();

</script>

</body>
</html>
