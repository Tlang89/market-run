<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PU$HER</title>

<style>
body{
  margin:0;
  background:black;
  color:gold;
  font-family:Arial;
  overflow:hidden;
}

/* BACKGROUND /
.bg{
  position:fixed;
  inset:0;
  background:url('detroit.png') center/cover no-repeat;
  filter:brightness(.65);
  transition:.4s;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
}

/ START SCREEN /
.startScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.title{
  font-size:42px;
  margin-bottom:30px;
  letter-spacing:3px;
}

.menu button{
  display:block;
  margin:10px;
  padding:14px 30px;
  border:1px solid gold;
  background:transparent;
  color:gold;
  font-size:18px;
}

/ HUD /
.top{
  position:absolute;
  top:15px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
}

.box{
  border:1px solid gold;
  padding:8px 12px;
  border-radius:12px;
  background:rgba(0,0,0,.6);
}

/ PANEL /
.panel{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:420px;
  background:rgba(0,0,0,.85);
  border:2px solid gold;
  border-radius:12px;
  padding:15px;
}

.panel h2{
  margin:10px 0;
}

/ BUTTONS /
.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

button{
  padding:12px;
  border:1px solid gold;
  background:transparent;
  color:gold;
}

/ FEED */
.feed{
  margin-top:15px;
  font-size:14px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<!-- START SCREEN -->
<div class="startScreen" id="startScreen">
  <div class="title">THE PU$HER</div>
  <div class="menu">
    <button onclick="startGame()">START RUN</button>
    <button>CONTINUE</button>
    <button>SETTINGS</button>
    <button>CREDITS</button>
  </div>
</div>

<!-- GAME UI -->
<div id="gameUI" style="display:none;">

<div class="top">
  <div class="box" id="cityBox">DETROIT<br>DAY 1</div>
  <div class="box">$<span id="cash">1000</span><br>HEAT: LOW</div>
</div>

<div class="panel">

<h2>MARKET</h2>
<p onclick="buy()">Bootleg Tapes — $50</p>
<p onclick="buy()">Jewelry — $300</p>
<p onclick="buy()">Electronics — $200</p>

<h2>INVENTORY</h2>
<p id="inv">No product on hand</p>

<div class="buttons">
<button onclick="sell()">SELL</button>
<button onclick="store()">STORE</button>
<button onclick="travel()">TRAVEL</button>
<button onclick="stay()">STAY</button>
</div>

<div class="feed" id="feed">
[Day 1] The city opened up. Your run began.
</div>

</div>

</div>

<!-- AUDIO -->
<audio id="rain" src="rain.mp3" loop></audio>
<audio id="click" src="click.mp3"></audio>
<audio id="travelSound" src="travel.mp3"></audio>
<audio id="tense" src="tense.mp3"></audio>
<audio id="voice" src="intro.mp3"></audio>

<script>

let cash=1000;
let cityIndex=0;

const cities=[
 {name:"DETROIT",img:"detroit.png"},
 {name:"CHICAGO",img:"chicago.png"},
 {name:"NEW YORK",img:"ny.png"}
];

function play(a){
 a.currentTime=0;
 a.play().catch(()=>{});
}

// START GAME
function startGame(){
 document.getElementById("startScreen").style.display="none";
 document.getElementById("gameUI").style.display="block";

 play(rain);
 play(voice); // YOUR VOICE INTRO
}

// UPDATE
function update(){
 document.getElementById("cash").innerText=cash;
}

// FEED
function addFeed(text){
 let f=document.getElementById("feed");
 f.innerHTML += "<br>"+text;
}

// ACTIONS
function buy(){
 play(click);
 cash-=50;
 update();
 addFeed("You made a move.");
}

function sell(){
 play(click);
 cash+=120;
 update();
 addFeed("You flipped product.");
}

function store(){
 play(click);
 addFeed("You laid low.");
}

function stay(){
 play(tense);
 addFeed("Something feels off tonight...");
}

// TRAVEL
function travel(){
 play(travelSound);

 cityIndex=(cityIndex+1)%cities.length;
 let c=cities[cityIndex];

 document.getElementById("bg").style.backgroundImage=url('${c.img}');
 document.getElementById("cityBox").innerHTML=c.name+"<br>DAY "+(cityIndex+1);

 addFeed("You moved to "+c.name);
}

</script>

</body>
</html>
